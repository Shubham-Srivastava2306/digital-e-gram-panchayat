<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Apply for Services</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="container">
    <h2>Available Services</h2>
    <div id="servicesList"></div>
    <p id="msg"></p>
  </div>

  <script type="module">
    import { auth, db } from "../js/firebase.js";
    import {
      collection,
      getDocs,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const servicesList = document.getElementById("servicesList");
    const msg = document.getElementById("msg");
    let currentUser = null;

    // Wait for user to be logged in
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "../login.html";
        return;
      }
      currentUser = user;
      loadServices();
    });

    async function loadServices() {
      const querySnapshot = await getDocs(collection(db, "services"));
      if (querySnapshot.empty) {
        servicesList.innerHTML = "<p>No services available.</p>";
        return;
      }

      servicesList.innerHTML = "";
      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const serviceDiv = document.createElement("div");
        serviceDiv.style.border = "1px solid #ccc";
        serviceDiv.style.padding = "10px";
        serviceDiv.style.marginBottom = "15px";
        serviceDiv.style.borderRadius = "6px";

        serviceDiv.innerHTML = `
          <h3>${data.name}</h3>
          <p>${data.description}</p>
          <button onclick="applyService('${docSnap.id}', '${data.name}')">Apply</button>
        `;

        servicesList.appendChild(serviceDiv);
      });
    }

    window.applyService = async function(serviceId, serviceName) {
      try {
        await addDoc(collection(db, "applications"), {
          userId: currentUser.uid,
          serviceId,
          serviceName,
          status: "Pending",
          appliedAt: serverTimestamp()
        });
        msg.innerText = "✅ Application submitted for " + serviceName;
      } catch (error) {
        msg.innerText = "❌ Failed to apply: " + error.message;
      }
    };
  </script>
</body>
</html>
