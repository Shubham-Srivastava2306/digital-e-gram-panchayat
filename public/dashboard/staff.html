<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="container">
    <h2>Welcome, Staff</h2>

    <section>
      <h3>Pending Applications</h3>
      <div id="applicationsList"></div>
    </section>

    <button onclick="logout()">Logout</button>
  </div>

  <script type="module">
    import { auth, db } from "../js/firebase.js";
    import {
      collection,
      getDocs,
      updateDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import {
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const applicationsList = document.getElementById("applicationsList");

    // Ensure staff is logged in
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "../login.html";
        return;
      }
      loadApplications();
    });

    // Load all applications
    async function loadApplications() {
      const snapshot = await getDocs(collection(db, "applications"));
      applicationsList.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        applicationsList.innerHTML += `
          <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
            <strong>Service:</strong> ${data.serviceName} <br/>
            <strong>User ID:</strong> ${data.userId} <br/>
            <strong>Status:</strong> <b>${data.status}</b> <br/>
            <button onclick="updateStatus('${docSnap.id}', 'Approved')">Approve</button>
            <button onclick="updateStatus('${docSnap.id}', 'Rejected')">Reject</button>
          </div>
        `;
      });
    }

    // Update status
    window.updateStatus = async function (id, status) {
      await updateDoc(doc(db, "applications", id), {
        status
      });
      loadApplications(); // Refresh list
    };

    // Logout function
    window.logout = function () {
      signOut(auth).then(() => {
        window.location.href = "../login.html";
      });
    };
  </script>
</body>
</html>
